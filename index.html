<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WRW Road to Legend</title>
  <meta name="theme-color" content="#f7f3ea" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WRW Milestones" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    :root {
      --bg: #f7f3ea;
      --card: #ffffff;
      --ink: #171717;
      --muted: #6b6258;
      --line: #ded6c8;
      --green: #048d64;
      --green-dark: #036b4d;
      --sand: #efe3cf;
      --purple: #7b3ff2;
      --pink: #e85da7;
      --gold: #c99b38;
      --shadow: 0 14px 35px rgba(20, 20, 20, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(4, 141, 100, 0.10), transparent 32rem),
        radial-gradient(circle at top right, rgba(123, 63, 242, 0.10), transparent 30rem),
        var(--bg);
      color: var(--ink);
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 22px 16px 90px;
    }

    header {
      background: linear-gradient(135deg, #ffffff 0%, #f2eadc 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -60px;
      top: -70px;
      background: radial-gradient(circle, rgba(4, 141, 100, 0.18), transparent 65%);
      border-radius: 50%;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--green-dark);
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 16px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .btn {
      min-height: 44px;
      border-radius: 999px;
      padding: 0 16px;
      font-weight: 800;
      border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      color: #fff;
      background: var(--green);
      box-shadow: 0 10px 20px rgba(4, 141, 100, 0.22);
    }

    .btn-primary:hover {
      background: var(--green-dark);
    }

    .btn-ghost {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .btn-danger {
      color: #fff;
      background: #b93333;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(20, 20, 20, 0.04);
    }

    .stat strong {
      display: block;
      font-size: 1.8rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .section {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      padding: 10px 8px 14px;
    }

    .section-title-wrap {
      min-width: 0;
    }

    h2 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .section-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .section-progress {
      text-align: right;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .bar {
      width: 110px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #ebe1d2;
      margin-top: 8px;
      margin-left: auto;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
      width: 0%;
      transition: width 0.25s ease;
    }

    .milestone-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .milestone {
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      min-height: 112px;
      box-shadow: 0 8px 18px rgba(20, 20, 20, 0.045);
      display: flex;
      flex-direction: column;
      gap: 9px;
      position: relative;
      overflow: hidden;
    }

    .milestone.done {
      border-color: rgba(4, 141, 100, 0.42);
      background:
        linear-gradient(135deg, rgba(4, 141, 100, 0.10), rgba(255, 255, 255, 0.92) 58%),
        #fff;
    }

    .milestone.done::after {
      content: "UNLOCKED";
      position: absolute;
      right: -22px;
      top: 13px;
      transform: rotate(28deg);
      color: rgba(4, 141, 100, 0.15);
      font-weight: 950;
      letter-spacing: 0.08em;
      font-size: 0.82rem;
    }

    .milestone-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .badge {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #efe7d9;
      color: var(--muted);
      font-weight: 950;
      flex: 0 0 auto;
    }

    .done .badge {
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      box-shadow: 0 8px 16px rgba(4, 141, 100, 0.24);
    }

    .milestone-title {
      font-weight: 900;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    .milestone-date {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .milestone-date.empty {
      color: #948a7c;
    }

    .medal-section.rattlesnake h2::before { content: "🐍 "; }
    .medal-section.warrior h2::before { content: "⚡ "; }
    .medal-section.deadman h2::before { content: "⚰️ "; }
    .medal-section.sunset h2::before { content: "🌇 "; }

    dialog {
      width: min(440px, calc(100% - 28px));
      border: 0;
      border-radius: 26px;
      padding: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      background: #fff;
      color: var(--ink);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(2px);
    }

    .modal-inner {
      padding: 20px;
    }

    .modal-kicker {
      color: var(--green-dark);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      margin-bottom: 6px;
    }

    .modal-title {
      font-size: 1.35rem;
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    label {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 7px;
    }

    input[type="date"] {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 12px;
      font: inherit;
      font-weight: 800;
      background: #fbf7f0;
      color: var(--ink);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .timeline {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .timeline h2 {
      margin-bottom: 12px;
    }

    .timeline-list {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
    }

    .timeline-date {
      min-width: 112px;
      color: var(--green-dark);
      font-weight: 950;
      font-size: 0.86rem;
    }

    .timeline-name {
      font-weight: 850;
    }

    .timeline-group {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .empty-state {
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 18px;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: #171717;
      color: #fff;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 850;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 20;
      box-shadow: 0 14px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: max-content;
      max-width: calc(100% - 28px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 820px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .milestone-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 14px 10px 80px;
      }

      header {
        padding: 20px;
        border-radius: 24px;
      }

      .section {
        padding: 10px;
      }

      .section-head {
        display: block;
      }

      .section-progress {
        text-align: left;
        margin-top: 10px;
      }

      .bar {
        margin-left: 0;
        width: 100%;
      }

      .milestone-grid {
        grid-template-columns: 1fr;
      }

      .timeline-item {
        display: block;
      }

      .timeline-date {
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="eyebrow">Walk Run Wrestle</div>
      <h1>Road to Legend</h1>
      <p class="subtitle">
        A founder milestone board for Liam & Becca. Backdate the wins, unlock the stickers, and build the WRW story one moment at a time.
      </p>

      <div class="top-actions">
        <button class="btn btn-primary" id="jumpIncomplete">Next Milestone</button>
        <button class="btn btn-ghost" id="installApp" style="display:none;">Install App</button>
        <button class="btn btn-ghost" id="exportData">Export Backup</button>
        <button class="btn btn-ghost" id="importData">Import Backup</button>
        <button class="btn btn-danger" id="resetAll">Reset All</button>
      </div>
    </header>

    <section class="stats-grid" aria-label="Overall progress">
      <div class="stat">
        <strong id="statDone">0</strong>
        <span>Unlocked</span>
      </div>
      <div class="stat">
        <strong id="statTotal">0</strong>
        <span>Total Milestones</span>
      </div>
      <div class="stat">
        <strong id="statPercent">0%</strong>
        <span>Progress</span>
      </div>
      <div class="stat">
        <strong id="statLeft">0</strong>
        <span>Still to Chase</span>
      </div>
    </section>

    <main id="sections"></main>

    <section class="timeline">
      <h2>Unlocked Timeline</h2>
      <div id="timelineList" class="timeline-list"></div>
    </section>
  </div>

  <dialog id="dateModal">
    <div class="modal-inner">
      <div class="modal-kicker">Milestone Date</div>
      <div class="modal-title" id="modalTitle">Milestone</div>
      <label for="dateInput">Date completed</label>
      <input id="dateInput" type="date" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveDate">Save Date</button>
        <button class="btn btn-ghost" id="cancelModal">Cancel</button>
        <button class="btn btn-danger" id="clearMilestone">Clear</button>
      </div>
    </div>
  </dialog>

  <input type="file" id="importFile" accept="application/json" hidden />
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "wrw-road-to-legend-v1";

    const groups = [
      {
        id: "foundation",
        title: "Foundation",
        note: "The moments that turned WRW from an idea into something real.",
        milestones: [
          ["opened_wrw", "Opened WRW"],
          ["website_launched", "Website Launched"],
          ["first_app_built", "First App Built"],
          ["first_app_live", "First App Live"],
          ["first_social_post", "First Social Post"],
          ["first_10_followers", "First 10 Followers"],
          ["first_50_followers", "First 50 Followers"],
          ["first_100_followers", "First 100 Followers"]
        ]
      },
      {
        id: "business",
        title: "Business & Sales",
        note: "The proof that this is becoming a business, not just a project.",
        milestones: [
          ["first_sale", "First Sale"],
          ["second_sale", "Second Sale"],
          ["fifth_sale", "Fifth Sale"],
          ["tenth_sale", "Tenth Sale"],
          ["twenty_five_sales", "25 Sales"],
          ["fifty_sales", "50 Sales"],
          ["one_hundred_sales", "100 Sales"],
          ["first_repeat_customer", "First Repeat Customer"],
          ["first_customer_photo", "First Customer Photo Shared"],
          ["first_organic_sale", "First Organic Sale"]
        ]
      },
      {
        id: "rattlesnake",
        title: "Rattlesnake",
        note: "The first released WRW medal.",
        className: "medal-section rattlesnake",
        milestones: [
          ["rattlesnake_received", "Rattlesnake Received"],
          ["rattlesnake_released", "Rattlesnake Released"],
          ["rattlesnake_first_sale", "Rattlesnake 1st Sale"],
          ["rattlesnake_second_sale", "Rattlesnake 2nd Sale"],
          ["rattlesnake_fifth_sale", "Rattlesnake 5th Sale"],
          ["rattlesnake_tenth_sale", "Rattlesnake 10th Sale"]
        ]
      },
      {
        id: "warrior",
        title: "Warrior",
        note: "The glow-in-the-dark 21K release.",
        className: "medal-section warrior",
        milestones: [
          ["warrior_received", "Warrior Received"],
          ["warrior_released", "Warrior Released"],
          ["warrior_first_sale", "Warrior 1st Sale"],
          ["warrior_second_sale", "Warrior 2nd Sale"],
          ["warrior_fifth_sale", "Warrior 5th Sale"],
          ["warrior_tenth_sale", "Warrior 10th Sale"]
        ]
      },
      {
        id: "deadman",
        title: "Deadman",
        note: "In production with the manufacturer.",
        className: "medal-section deadman",
        milestones: [
          ["deadman_ordered", "Deadman Ordered"],
          ["deadman_received", "Deadman Received"],
          ["deadman_released", "Deadman Released"],
          ["deadman_first_sale", "Deadman 1st Sale"],
          ["deadman_second_sale", "Deadman 2nd Sale"],
          ["deadman_fifth_sale", "Deadman 5th Sale"],
          ["deadman_tenth_sale", "Deadman 10th Sale"]
        ]
      },
      {
        id: "sunset",
        title: "Sunset Slam",
        note: "The first Main Event medal in production.",
        className: "medal-section sunset",
        milestones: [
          ["sunset_ordered", "Sunset Slam Ordered"],
          ["sunset_received", "Sunset Slam Received"],
          ["sunset_released", "Sunset Slam Released"],
          ["sunset_first_sale", "Sunset Slam 1st Sale"],
          ["sunset_second_sale", "Sunset Slam 2nd Sale"],
          ["sunset_fifth_sale", "Sunset Slam 5th Sale"],
          ["sunset_tenth_sale", "Sunset Slam 10th Sale"]
        ]
      },
      {
        id: "product",
        title: "Product & Brand Growth",
        note: "The bigger WRW expansion moments.",
        milestones: [
          ["second_medal_released", "Second Medal Released"],
          ["third_medal_released", "Third Medal Released"],
          ["first_main_event_released", "First Main Event Released"],
          ["first_limited_drop", "First Limited Drop"],
          ["first_preorder_launched", "First Preorder Launched"],
          ["first_sell_out", "First Sell Out"]
        ]
      },
      {
        id: "community",
        title: "Community",
        note: "The Locker Room and the people building around WRW.",
        milestones: [
          ["first_locker_room_member", "First Locker Room Member"],
          ["ten_locker_room_members", "10 Locker Room Members"],
          ["twenty_five_locker_room_members", "25 Locker Room Members"],
          ["fifty_locker_room_members", "50 Locker Room Members"],
          ["first_locker_room_post", "First Locker Room Post"],
          ["first_community_interaction", "First Community Interaction"]
        ]
      },
      {
        id: "bigwins",
        title: "Big Wins",
        note: "The moments that should feel massive.",
        milestones: [
          ["revenue_100", "£100 Revenue"],
          ["revenue_500", "£500 Revenue"],
          ["revenue_1000", "£1000 Revenue"],
          ["first_multi_sale_day", "First Multi-Sale Day"],
          ["first_multi_sale_month", "First Multi-Sale Month"],
          ["first_stranger_customer", "First Stranger Customer"]
        ]
      }
    ];

    const allMilestones = groups.flatMap(group =>
      group.milestones.map(([id, name]) => ({ id, name, groupId: group.id, groupTitle: group.title }))
    );

    let state = loadState();
    let activeMilestoneId = null;

    const sectionsEl = document.getElementById("sections");
    const timelineList = document.getElementById("timelineList");
    const dateModal = document.getElementById("dateModal");
    const modalTitle = document.getElementById("modalTitle");
    const dateInput = document.getElementById("dateInput");
    const toast = document.getElementById("toast");
    const importFile = document.getElementById("importFile");

    function todayIso() {
      const d = new Date();
      const offset = d.getTimezoneOffset();
      const localDate = new Date(d.getTime() - offset * 60000);
      return localDate.toISOString().slice(0, 10);
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatDate(isoDate) {
      if (!isoDate) return "";
      const [year, month, day] = isoDate.split("-").map(Number);
      return new Date(year, month - 1, day).toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function render() {
      sectionsEl.innerHTML = "";

      groups.forEach(group => {
        const doneCount = group.milestones.filter(([id]) => state[id]?.completed).length;
        const totalCount = group.milestones.length;
        const percent = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

        const section = document.createElement("section");
        section.className = `section ${group.className || ""}`.trim();
        section.id = `section-${group.id}`;

        section.innerHTML = `
          <div class="section-head">
            <div class="section-title-wrap">
              <h2>${group.title}</h2>
              <div class="section-note">${group.note}</div>
            </div>
            <div class="section-progress">
              ${doneCount} / ${totalCount} unlocked
              <div class="bar"><span style="width:${percent}%"></span></div>
            </div>
          </div>
          <div class="milestone-grid"></div>
        `;

        const grid = section.querySelector(".milestone-grid");

        group.milestones.forEach(([id, name]) => {
          const completed = Boolean(state[id]?.completed);
          const date = state[id]?.date || "";

          const button = document.createElement("button");
          button.className = `milestone ${completed ? "done" : ""}`;
          button.type = "button";
          button.dataset.id = id;
          button.innerHTML = `
            <div class="milestone-top">
              <div class="badge">${completed ? "✓" : "+"}</div>
            </div>
            <div class="milestone-title">${name}</div>
            <div class="milestone-date ${date ? "" : "empty"}">${date ? "📅 " + formatDate(date) : "Tap to add date"}</div>
          `;

          button.addEventListener("click", () => openModal(id, name));
          grid.appendChild(button);
        });

        sectionsEl.appendChild(section);
      });

      renderStats();
      renderTimeline();
    }

    function renderStats() {
      const total = allMilestones.length;
      const done = allMilestones.filter(m => state[m.id]?.completed).length;
      const left = total - done;
      const percent = total ? Math.round((done / total) * 100) : 0;

      document.getElementById("statDone").textContent = done;
      document.getElementById("statTotal").textContent = total;
      document.getElementById("statLeft").textContent = left;
      document.getElementById("statPercent").textContent = percent + "%";
    }

    function renderTimeline() {
      const completed = allMilestones
        .filter(m => state[m.id]?.completed && state[m.id]?.date)
        .sort((a, b) => state[a.id].date.localeCompare(state[b.id].date));

      if (!completed.length) {
        timelineList.innerHTML = `<div class="empty-state">No milestones unlocked yet. Tap a milestone, choose the date, and your WRW timeline starts here.</div>`;
        return;
      }

      timelineList.innerHTML = "";
      completed.forEach(m => {
        const item = document.createElement("div");
        item.className = "timeline-item";
        item.innerHTML = `
          <div class="timeline-date">${formatDate(state[m.id].date)}</div>
          <div>
            <div class="timeline-name">${m.name}</div>
            <div class="timeline-group">${m.groupTitle}</div>
          </div>
        `;
        timelineList.appendChild(item);
      });
    }

    function openModal(id, name) {
      activeMilestoneId = id;
      modalTitle.textContent = name;
      dateInput.value = state[id]?.date || todayIso();
      const isCompleted = Boolean(state[id]?.completed);
      document.getElementById("clearMilestone").style.display = isCompleted ? "inline-block" : "none";
      dateModal.showModal();
    }

    function closeModal() {
      activeMilestoneId = null;
      dateModal.close();
    }

    document.getElementById("saveDate").addEventListener("click", () => {
      if (!activeMilestoneId) return;
      if (!dateInput.value) {
        showToast("Choose a date first");
        return;
      }

      const milestone = allMilestones.find(m => m.id === activeMilestoneId);
      const wasDone = Boolean(state[activeMilestoneId]?.completed);

      state[activeMilestoneId] = {
        completed: true,
        date: dateInput.value,
        updatedAt: new Date().toISOString()
      };

      saveState();
  
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installApp");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          console.log("Service worker registration failed");
        });
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.style.display = "inline-block";
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showToast("Use browser menu: Add to Home Screen");
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.style.display = "none";
      });
    }

    render();
      closeModal();
      showToast(wasDone ? "Date updated" : `Sticker unlocked: ${milestone.name}`);
    });

    document.getElementById("clearMilestone").addEventListener("click", () => {
      if (!activeMilestoneId) return;
      const ok = confirm("Clear this milestone and remove its date?");
      if (!ok) return;

      delete state[activeMilestoneId];
      saveState();
  
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installApp");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          console.log("Service worker registration failed");
        });
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.style.display = "inline-block";
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showToast("Use browser menu: Add to Home Screen");
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.style.display = "none";
      });
    }

    render();
      closeModal();
      showToast("Milestone cleared");
    });

    document.getElementById("cancelModal").addEventListener("click", closeModal);

    document.getElementById("jumpIncomplete").addEventListener("click", () => {
      const next = allMilestones.find(m => !state[m.id]?.completed);
      if (!next) {
        showToast("Every milestone is unlocked");
        return;
      }

      const button = document.querySelector(`[data-id="${next.id}"]`);
      if (button) {
        button.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => button.focus(), 400);
      }
    });

    document.getElementById("resetAll").addEventListener("click", () => {
      const ok = confirm("Reset every milestone? This removes all dates saved on this device.");
      if (!ok) return;
      state = {};
      saveState();
  
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installApp");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          console.log("Service worker registration failed");
        });
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.style.display = "inline-block";
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showToast("Use browser menu: Add to Home Screen");
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.style.display = "none";
      });
    }

    render();
      showToast("All milestones reset");
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const backup = {
        app: "WRW Road to Legend",
        version: 1,
        exportedAt: new Date().toISOString(),
        milestones: state
      };

      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "wrw-road-to-legend-backup.json";
      a.click();
      URL.revokeObjectURL(url);
      showToast("Backup exported");
    });

    document.getElementById("importData").addEventListener("click", () => {
      importFile.value = "";
      importFile.click();
    });

    importFile.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const importedState = data.milestones || data;

        if (!importedState || typeof importedState !== "object") {
          throw new Error("Invalid file");
        }

        const ok = confirm("Import this backup? It will replace the milestones saved on this device.");
        if (!ok) return;

        state = importedState;
        saveState();
    
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installApp");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          console.log("Service worker registration failed");
        });
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.style.display = "inline-block";
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showToast("Use browser menu: Add to Home Screen");
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.style.display = "none";
      });
    }

    render();
        showToast("Backup imported");
      } catch {
        showToast("Could not import that file");
      }
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timeout);
      showToast.timeout = setTimeout(() => toast.classList.remove("show"), 2200);
    }


    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installApp");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          console.log("Service worker registration failed");
        });
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.style.display = "inline-block";
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showToast("Use browser menu: Add to Home Screen");
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.style.display = "none";
      });
    }

    render();
  </script>
</body>
